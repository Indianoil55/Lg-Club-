<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG CLUB - Official</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #ffdf8e; --bg: #0b0505; --card: #1a0a0a; --red: #ff3333; --green: #28a745; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Header */
        .header { background: #350a0a; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1.5px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .bal-display { background: rgba(0,0,0,0.7); padding: 6px 15px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-weight: 800; font-size: 14px; }

        /* Multiplier History */
        .history-strip { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: #130606; border-bottom: 1px solid #2d1111; scrollbar-width: none; }
        .hist-chip { background: #2a1111; padding: 3px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; color: var(--gold); border: 0.5px solid #4d1a1a; min-width: 45px; text-align: center; }

        /* GoRush Crash Engine */
        .game-canvas { padding: 15px; text-align: center; position: relative; }
        .display-area { background: radial-gradient(circle, #5a0d0d 0%, #0b0505 100%); height: 240px; border-radius: 18px; border: 1.5px solid #4d1a1a; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 50px rgba(0,0,0,0.8); }
        #multi-text { font-size: 65px; font-weight: 900; color: var(--gold); z-index: 10; text-shadow: 0 0 20px rgba(255, 223, 142, 0.4); }
        .rocket-anim { position: absolute; bottom: 20px; left: 20px; width: 60px; transition: 0.1s linear; filter: drop-shadow(0 0 10px var(--red)); }

        /* Betting Section */
        .bet-box { background: var(--card); padding: 20px; border-radius: 20px; margin: 15px; border: 1.5px solid #2d1111; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .amt-input { width: 100%; padding: 15px; background: #000; border: 1px solid #4d1a1a; color: var(--gold); border-radius: 12px; font-size: 22px; text-align: center; font-weight: bold; margin-bottom: 15px; outline: none; }
        .btn-action { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 900; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; background: linear-gradient(180deg, #ffdf8e 0%, #c69433 100%); color: #350a0a; transition: 0.2s; }
        .btn-cashout { background: linear-gradient(180deg, #28a745 0%, #1e7e34 100%) !important; color: #fff !important; box-shadow: 0 0 20px rgba(40, 167, 69, 0.4); }

        /* Games Grid */
        .section-label { padding: 0 20px; font-size: 12px; color: #777; font-weight: bold; text-transform: uppercase; }
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px 20px; }
        .game-item { background: var(--card); border-radius: 12px; padding: 10px; border: 1px solid #2d1111; text-align: center; position: relative; }
        .game-item img { width: 100%; border-radius: 8px; margin-bottom: 8px; filter: contrast(1.1); }
        .game-title { font-size: 10px; font-weight: bold; color: #aaa; }
        .badge { position: absolute; top: 5px; right: 5px; background: var(--red); font-size: 8px; padding: 2px 6px; border-radius: 5px; font-weight: 800; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:900; color: var(--gold); font-size: 22px; font-style: italic;">LG CLUB</div>
        <div class="bal-display">₹<span id="bal-amt">10.00</span></div>
        <button onclick="togglePay(true)" style="background: var(--green); color: #fff; border:none; padding: 7px 15px; border-radius: 8px; font-weight: bold; font-size: 12px;">DEPOSIT</button>
    </div>

    <div class="history-strip" id="history-container">
        <div class="hist-chip">1.22x</div>
        <div class="hist-chip" style="color:#9c27b0">12.50x</div>
        <div class="hist-chip">2.10x</div>
        <div class="hist-chip" style="color:#ff3333">1.02x</div>
    </div>

    <div id="lobby">
        <div class="game-canvas">
            <div class="display-area">
                <div id="status-info" style="position: absolute; top: 15px; color: #666; font-size: 11px; letter-spacing: 2px;">PREPARING...</div>
                <div id="multi-text">1.00x</div>
                <img id="rocket-obj" class="rocket-anim" src="https://img.icons8.com/external-flatart-icons-flat-flatarticons/64/000000/external-rocket-space-flatart-icons-flat-flatarticons.png" style="filter: invert(48%) sepia(79%) saturate(2476%) hue-rotate(328deg) brightness(118%) contrast(119%);">
            </div>

            <div class="bet-box">
                <input type="number" id="user-bet" class="amt-input" value="10">
                <button id="main-btn" class="btn-action" onclick="processBet()">BET</button>
            </div>
        </div>

        <p class="section-label">Popular Turbo Games</p>
        <div class="games-grid">
            <div class="game-item"><span class="badge">HOT</span><img src="https://i.imgur.com/B7yM7yM.jpg"><div class="game-title">Mines</div></div>
            <div class="game-item"><img src="https://i.imgur.com/pYvV8vV.jpg"><div class="game-title">Aviator</div></div>
            <div class="game-item"><img src="https://i.imgur.com/yourpoker.jpg"><div class="game-title">Dice</div></div>
        </div>
    </div>

    <div id="pay-screen" class="hidden" style="position:fixed; top:0; background:var(--bg); width:100%; height:100%; z-index:2000; padding:20px; text-align:center;">
        <button onclick="togglePay(false)" style="float:left; background:none; border:none; color:#fff; font-size:30px;">⬅</button>
        <h2 style="color:var(--gold); margin-top: 50px;">Deposit Funds</h2>
        <div id="qr-box" style="background:#fff; padding:15px; width:200px; margin:30px auto; border-radius:15px; box-shadow: 0 0 30px rgba(255,223,142,0.2);"></div>
        <p style="color:#aaa;">Official UPI ID: <br><b style="color:#fff; font-size: 18px;">7470807k@nyes</b></p>
        <input type="number" id="utr-ref" class="amt-input" style="width: 90%;" placeholder="Enter 12-Digit UTR">
        <button class="btn-action" style="width: 90%;" onclick="alert('Submission Received!')">CONFIRM PAYMENT</button>
    </div>

<script>
    let currentBal = 10.00;
    let currentMulti = 1.00;
    let isGameRunning = false;
    let isBetActive = false;
    let engine;

    function processBet() {
        let btn = document.getElementById('main-btn');
        let amt = parseFloat(document.getElementById('user-bet').value);

        if(!isGameRunning && !isBetActive) {
            if(amt > currentBal) return alert("Insufficient Balance");
            currentBal -= amt;
            updateBalance();
            isBetActive = true;
            btn.innerText = "WAITING...";
            btn.style.opacity = "0.5";
        } else if(isGameRunning && isBetActive) {
            // Cashout Logic
            let winning = amt * currentMulti;
            currentBal += winning;
            isBetActive = false;
            btn.innerText = "WIN: ₹" + winning.toFixed(2);
            btn.classList.add('btn-cashout');
            updateBalance();
            setTimeout(() => { btn.classList.remove('btn-cashout'); btn.innerText = "BET"; }, 2000);
        }
    }

    function runEngine() {
        let crashPoint = (Math.random() * 4.5 + 1.05).toFixed(2);
        currentMulti = 1.00;
        isGameRunning = true;
        document.getElementById('status-info').innerText = "LIVE";
        document.getElementById('multi-text').style.color = "var(--gold)";
        
        let btn = document.getElementById('main-btn');
        if(isBetActive) { btn.innerText = "CASH OUT"; btn.style.opacity = "1"; }

        engine = setInterval(() => {
            currentMulti += 0.01;
            document.getElementById('multi-text').innerText = currentMulti.toFixed(2) + "x";
            
            // Rocket VC Animation
            let rocket = document.getElementById('rocket-obj');
            rocket.style.left = (20 + (currentMulti-1)*45) + "px";
            rocket.style.bottom = (20 + (currentMulti-1)*55) + "px";

            if(currentMulti >= crashPoint) {
                clearInterval(engine);
                isGameRunning = false;
                document.getElementById('multi-text').innerText = "FLEW AWAY!";
                document.getElementById('multi-text').style.color = "var(--red)";
                document.getElementById('status-info').innerText = "CRASHED @ " + crashPoint + "x";
                
                // Add to History Bar
                let history = document.getElementById('history-container');
                let color = crashPoint > 2 ? "#9c27b0" : "var(--gold)";
                history.innerHTML = `<div class="hist-chip" style="color:${color}">${crashPoint}x</div>` + history.innerHTML;

                if(isBetActive) { btn.innerText = "LOST!"; isBetActive = false; }

                setTimeout(() => {
                    document.getElementById('multi-text').innerText = "1.00x";
                    rocket.style.left = "20px"; rocket.style.bottom = "20px";
                    btn.innerText = "BET";
                    document.getElementById('status-info').innerText = "NEXT ROUND IN 5s";
                    setTimeout(runEngine, 5000);
                }, 4000);
            }
        }, 80);
    }

    function updateBalance() { document.getElementById('bal-amt').innerText = currentBal.toFixed(2); }
    
    function togglePay(show) {
        document.getElementById('pay-screen').classList.toggle('hidden', !show);
        if(show) {
            document.getElementById('qr-box').innerHTML = "";
            new QRCode(document.getElementById("qr-box"), { text: "upi://pay?pa=7470807k@nyes&pn=LGCLUB&am=100&cu=INR", width: 200, height: 200 });
        }
    }

    // Initial Start
    setTimeout(runEngine, 3000);
</script>
</body>
</html>
