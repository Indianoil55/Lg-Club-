<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG CLUB CASINO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Arial', sans-serif; margin: 0; text-align: center; }
        .nav { background: #1a1a1a; padding: 15px; border-bottom: 2px solid gold; font-weight: bold; }
        .card { background: #222; margin: 10px; padding: 20px; border-radius: 15px; border: 1px solid #444; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .game-btn { background: #333; padding: 20px; border-radius: 10px; border: 1px solid gold; cursor: pointer; }
        button { background: gold; color: black; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #app-view { display: none; }
    </style>
</head>
<body>

    <div class="nav">LG CLUB CASINO</div>

    <div id="auth-view" class="card">
        <h2>LOGIN / REGISTER</h2>
        <input type="text" id="user" placeholder="Username"><br>
        <input type="password" id="pass" placeholder="Password"><br>
        <input type="text" id="ref-code" placeholder="Referral Code (Optional)"><br>
        <button onclick="auth()">ENTER</button>
    </div>

    <div id="app-view">
        <div class="card">
            <h3>WALLET: ₹<span id="bal">0</span></h3>
            <p>ID: <span id="uid"></span></p>
            <button onclick="document.getElementById('pay-modal').style.display='block'">RECHARGE</button>
            <button onclick="window.open('https://t.me/your_telegram')">SUPPORT</button>
        </div>

        <div class="game-grid">
            <div class="game-btn" onclick="alert('Loading Aviator...')">✈️ AVIATOR</div>
            <div class="game-btn" onclick="alert('Loading Slots...')">🎰 SLOTS</div>
            <div class="game-btn" onclick="alert('Loading Julli...')">🔴 COLOR</div>
            <div class="game-btn" onclick="alert('Loading Mines...')">💣 MINES</div>
        </div>
    </div>

    <div id="pay-modal" style="display:none; position:fixed; top:20%; left:10%; width:80%; background:#111; padding:20px; border:2px solid gold;">
        <h3>RECHARGE (₹100+)</h3>
        <p>UPI: 7470807598-1@nyes</p>
        <input type="text" id="utr" placeholder="Enter 12-Digit UTR"><br><br>
        <button onclick="submitUTR()">SUBMIT UTR</button>
    </div>

<script>
    const db = firebase.database();
    firebase.initializeApp({ databaseURL: "https://lg-club-db-default-rtdb.firebaseio.com/" });
    
    let currentU = "";

    function auth() {
        let u = document.getElementById('user').value;
        let p = document.getElementById('pass').value;
        let ref = document.getElementById('ref-code').value;

        db.ref('users/' + u).once('value', (snap) => {
            if(snap.exists()) {
                if(snap.val().pass === p) {
                    currentU = u;
                    loadApp(snap.val());
                } else { alert("Wrong Password!"); }
            } else {
                // New User Creation
                let uid = "LG" + Math.floor(1000 + Math.random() * 9000);
                db.ref('users/' + u).set({ pass: p, balance: 0, uid: uid, refBy: ref || "None" });
                alert("Account Created! Login Now.");
            }
        });
    }

    function loadApp(data) {
        document.getElementById('auth-view').style.display = 'none';
        document.getElementById('app-view').style.display = 'block';
        document.getElementById('bal').innerText = data.balance;
        document.getElementById('uid').innerText = data.uid;
    }

    function submitUTR() {
        let utr = document.getElementById('utr').value;
        if(utr.length === 12) {
            db.ref('recharges/' + utr).set({ user: currentU, status: 'pending' });
            alert("UTR Submitted! Admin will verify soon.");
            document.getElementById('pay-modal').style.display = 'none';
        } else { alert("Invalid UTR"); }
    }
</script>
</body>
</html>
