<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG CLUB - OFFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #ffdf8e; --dark-red: #410a0a; --bg: #0b0505; }
        body { background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Season 1: Professional Mobile Login */
        #auth-page { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, #5a0d0d, #0b0505); height: 100vh; }
        .login-container { margin-top: 50px; }
        .input-group { position: relative; margin-bottom: 15px; }
        input { width: 85%; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid #5a2d2d; color: #fff; border-radius: 10px; font-size: 16px; outline: none; }
        
        /* OTP Button Style */
        .otp-btn { position: absolute; right: 8%; top: 12px; background: transparent; border: none; color: var(--gold); font-weight: bold; cursor: pointer; }
        .btn-enter { background: linear-gradient(180deg, #ffdf8e, #c69433); color: #000; border: none; padding: 15px; width: 90%; border-radius: 30px; font-weight: bold; margin-top: 20px; font-size: 18px; box-shadow: 0 4px 15px rgba(198, 148, 51, 0.4); }

        /* Lobby Header */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #1a0a0a; border-bottom: 1px solid #331a1a; position: sticky; top: 0; z-index: 100; }
        .bal-display { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; color: var(--gold); border: 1px solid #444; font-weight: bold; }
        
        /* Footer Nav */
        .footer { position: fixed; bottom: 0; width: 100%; background: #1a0a0a; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #331a1a; }
        .nav-link { color: #888; text-decoration: none; font-size: 11px; text-align: center; cursor: pointer; }
        .nav-link.active { color: var(--gold); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-page">
        <h1 style="color:var(--gold); font-size: 40px; margin-bottom: 5px;">LG CLUB</h1>
        <p style="color: #ccc;">Enter Mobile Number to Play</p>
        
        <div class="login-container">
            <div class="input-group">
                <input type="number" id="phone" placeholder="Mobile Number">
            </div>
            <div class="input-group">
                <input type="number" id="otp-input" placeholder="Verification Code">
                <button class="otp-btn" onclick="sendOTP()">SEND</button>
            </div>
            <div class="input-group">
                <input type="password" id="pass" placeholder="Password">
            </div>
            <button class="btn-enter" onclick="verifyLogin()">ENTER</button>
        </div>
        <p style="margin-top: 20px; font-size: 12px; color: #888;">By clicking, you agree to our Terms.</p>
    </div>

    <div id="main-lobby" class="hidden">
        <div class="top-bar">
            <div style="font-weight:bold; color:var(--gold);">LG CLUB</div>
            <div class="bal-display">₹<span id="bal">0.00</span></div>
            <div onclick="location.reload()">🔄</div>
        </div>

        <div style="padding: 15px;">
            <div style="background: #251212; border-radius: 15px; padding: 40px; text-align: center; border: 1px solid var(--gold); cursor: pointer;" onclick="alert('Crash Starting...')">
                <h2 style="margin:0; color: #ff3333;">🚀 CRASH GAME</h2>
                <p style="font-size: 12px; color: var(--gold);">Multiplier up to 100x</p>
            </div>
        </div>

        <div class="footer">
            <div class="nav-link active">🏠<br>Home</div>
            <div class="nav-link">🏆<br>Rank</div>
            <div class="nav-link" style="background:#ff3333; color:#fff; padding: 5px 10px; border-radius: 10px; margin-top: -5px;">💰<br>Get Cash</div>
            <div class="nav-link">💎<br>VIP</div>
            <div class="nav-link">👤<br>Me</div>
        </div>
    </div>

<script>
    // Firebase Setup
    const firebaseConfig = { databaseURL: "https://lg-club-db-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let generatedOTP = "";

    function sendOTP() {
        let ph = document.getElementById('phone').value;
        if(ph.length < 10) return alert("Enter 10 Digit Number");
        
        // Mock OTP System (Actual SMS ke liye API chahiye hoti hai)
        generatedOTP = Math.floor(1000 + Math.random() * 9000);
        alert("Your LG CLUB OTP is: " + generatedOTP); 
        document.querySelector('.otp-btn').innerText = "RESEND";
    }

    function verifyLogin() {
        let ph = document.getElementById('phone').value;
        let otp = document.getElementById('otp-input').value;
        let pass = document.getElementById('pass').value;

        if(otp == generatedOTP && ph.length >= 10) {
            db.ref('users/' + ph).once('value', (snap) => {
                if(snap.exists()) {
                    loginSuccess(ph, snap.val().balance);
                } else {
                    // New User Registration
                    db.ref('users/' + ph).set({ 
                        password: pass, 
                        balance: 10, // Initial Signup Bonus
                        uid: "LG"+Math.floor(Math.random()*89999)+10000 
                    }).then(() => loginSuccess(ph, 10));
                }
            });
        } else {
            alert("Invalid OTP or Phone Number!");
        }
    }

    function loginSuccess(ph, balance) {
        document.getElementById('auth-page').classList.add('hidden');
        document.getElementById('main-lobby').classList.remove('hidden');
        document.getElementById('bal').innerText = (balance || 0).toFixed(2);
    }
</script>
</body>
</html>
