<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG CLUB - Official</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #ffdf8e; --dark-red: #350a0a; --bg: #0b0505; --card: #1f0d0d; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 70px; overflow-x: hidden; }
        
        /* Navigation & Header */
        .top-header { background: var(--dark-red); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #4d1a1a; position: sticky; top:0; z-index:100; }
        .bal-box { background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; }

        /* Login Screen */
        #auth-page { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, #5a0d0d, #0b0505); height: 100vh; position: fixed; width: 100%; top: 0; z-index: 200; }
        .input-group { margin-bottom: 15px; position: relative; }
        input { width: 85%; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid #5a2d2d; color: #fff; border-radius: 10px; font-size: 16px; outline: none; }
        .btn-gold { background: linear-gradient(180deg, #ffdf8e, #c69433); color: #000; border: none; padding: 15px; width: 90%; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 18px; }

        /* Deposit Page */
        #deposit-page { padding: 20px; text-align: center; }
        .qr-card { background: #fff; padding: 10px; width: 180px; height: 180px; margin: 20px auto; border-radius: 10px; }
        .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .chip { background: var(--card); border: 1px solid var(--gold); padding: 10px; border-radius: 8px; color: var(--gold); font-weight: bold; cursor: pointer; }

        /* Game Grid [Reference: PDF Page 10] */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .game-item { background: var(--card); border-radius: 12px; border: 1px solid #3d1a1a; overflow: hidden; position: relative; text-align: center; }
        .game-item img { width: 100%; height: 90px; object-fit: cover; }
        .game-item p { margin: 5px 0; font-size: 13px; font-weight: bold; color: var(--gold); }
        .new-tag { position: absolute; top: 5px; left: 5px; background: red; font-size: 10px; padding: 2px 6px; border-radius: 4px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-page">
        <h1 style="color:var(--gold); font-size: 45px; margin-bottom: 10px;">LG CLUB</h1>
        <p style="color: #ccc;">Secure Login with Mobile</p>
        <div class="input-group" style="margin-top: 50px;">
            <input type="number" id="login-phone" placeholder="Mobile Number">
        </div>
        <div class="input-group">
            <input type="number" id="login-otp" placeholder="Enter OTP">
            <button onclick="sendFakeOTP()" style="position: absolute; right: 10%; top: 15px; background: none; border: none; color: var(--gold); font-weight: bold;">SEND</button>
        </div>
        <button class="btn-gold" onclick="doLogin()">START PLAYING</button>
    </div>

    <div id="main-app" class="hidden">
        <div class="top-header">
            <div style="font-weight:bold; color:var(--gold); font-size: 20px;">LG CLUB</div>
            <div class="bal-box">₹<span id="bal-val">0.00</span></div>
        </div>

        <div style="padding: 15px;">
            <div style="background: #251212; border: 1px solid var(--gold); border-radius: 15px; padding: 20px; text-align: center; position: relative;">
                <h2 style="margin: 0; color: #ff4444;">🚀 GORUSH LIVE</h2>
                <div id="multiplier" style="font-size: 40px; color: var(--gold); margin: 15px 0;">1.00x</div>
                <button class="btn-gold" style="width: 80%;" onclick="alert('Bet Placed!')">PLACE BET</button>
            </div>
        </div>

        <div class="game-grid">
            <div class="game-item" onclick="showPage('deposit')">
                <span class="new-tag">HOT</span>
                <img src="https://i.imgur.com/B7yM7yM.jpg">
                <p>Deposit Cash</p>
            </div>
            <div class="game-item">
                <img src="https://i.imgur.com/LhLhLhL.jpg">
                <p>Turbo Mines</p>
            </div>
            <div class="game-item">
                <img src="https://i.imgur.com/pYvV8vV.jpg">
                <p>Aviator</p>
            </div>
            <div class="game-item">
                <img src="https://i.imgur.com/yourpoker.jpg">
                <p>Crystal Poker</p>
            </div>
        </div>
    </div>
