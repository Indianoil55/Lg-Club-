<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG CLUB - VIP EARNING SERVER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .header { background: linear-gradient(90deg, #ff3333, #8a0000); padding: 15px; font-weight: bold; border-bottom: 2px solid gold; }
        .wallet-box { background: #222; margin: 15px; padding: 15px; border-radius: 10px; border: 1px solid #444; }
        .balance { font-size: 24px; color: #00ff7f; font-weight: bold; }
        .box { background: #1a1a1a; border: 1px solid #ff3333; border-radius: 15px; padding: 20px; margin: 10px auto; max-width: 330px; }
        button { background: #ff3333; color: #fff; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .recharge-btn { background: gold; color: #000; }
        input { width: 90%; padding: 10px; margin: 5px; background: #333; color: #fff; border: 1px solid #555; border-radius: 5px; }
        #dashboard { display: none; }
        /* Payment Modal */
        #payment-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; }
    </style>
</head>
<body>

    <div class="header">LG CLUB OFFICIAL VIP SERVER</div>

    <div id="auth-section">
        <div class="box">
            <h2 style="color: #ff3333;">MEMBER LOGIN</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()">ENTER SERVER</button>
            <p onclick="showReg()" style="color:gray; cursor:pointer; font-size:12px;">New Member? Register</p>
        </div>
        <div id="reg-form" class="box" style="display:none;">
            <h2 style="color: #ff3333;">REGISTER</h2>
            <input type="text" id="reg-user" placeholder="Create Username">
            <input type="password" id="reg-pass" placeholder="Create Password">
            <button onclick="register()">CREATE ACCOUNT</button>
            <p onclick="showLogin()" style="color:gray; cursor:pointer;">Back to Login</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="wallet-box">
            <div>Available Balance</div>
            <div class="balance">₹<span id="user-balance">0</span></div>
            <button class="recharge-btn" onclick="openPayment()">RECHARGE WALLET</button>
        </div>
        <div class="box">
            <h3 style="color: gold;">PREDICTOR PRO</h3>
            <div id="res" style="font-size: 25px; margin: 15px 0; color: #00ff7f;">LOCKED 🔒</div>
            <button onclick="checkBalanceAndGet()">GET VIP SIGNAL (₹10)</button>
        </div>
    </div>

    <div id="payment-modal">
        <div class="box" style="margin-top:80px;">
            <h3 style="color:gold;">ADD MONEY</h3>
            <input type="number" id="recharge-amt" placeholder="Enter Amount (Min ₹100)">
            <button onclick="generateQR()" style="background:blue;">GENERATE QR</button>
            <div id="qr-display" style="display:none; margin-top:10px;">
                <img id="qr-img" src="" style="width:180px; border:4px solid white;">
                <p style="font-size:11px; color:cyan;">Scan & Pay. Send Screenshot to Admin.</p>
                <button onclick="closePayment()" style="background:red;">CLOSE</button>
            </div>
        </div>
    </div>

<script>
    // Firebase Config
    const firebaseConfig = { databaseURL: "https://lg-club-db-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentLogUser = "";

    function login() {
    let u = document.getElementById('user').value;
    let p = document.getElementById('pass').value;
    
    // ".on" use karne se balance apne aap update hota rahega
    db.ref('users/' + u).on('value', (snap) => {
        if(snap.exists() && snap.val().password === p) {
            currentLogUser = u;
            // Balance dikhane ke liye ye line zaroori hai
            document.getElementById('user-balance').innerText = snap.val().balance || 0;
            
            document.getElementById('auth-section').style.display='none';
            document.getElementById('dashboard').style.display='block';
        } else if (snap.exists()) {
            alert("Wrong Password!");
        } else {
            alert("User not found!");
        }
    });
}

    function register() {
        let u = document.getElementById('reg-user').value;
        let p = document.getElementById('reg-pass').value;
        if(u && p) {
            db.ref('users/' + u).set({ password: p, balance: 0 }).then(() => {
                alert("Account Created!"); showLogin();
            });
        }
    }

    function checkBalanceAndGet() {
        let bal = parseInt(document.getElementById('user-balance').innerText);
        if(bal >= 10) {
            let newBal = bal - 10;
            db.ref('users/' + currentLogUser).update({ balance: newBal });
            document.getElementById('user-balance').innerText = newBal;
            document.getElementById('res').innerText = "ANALYZING...";
            setTimeout(() => { document.getElementById('res').innerText = Math.random() > 0.5 ? "BIG 🔴" : "SMALL 🟢"; }, 1500);
        } else { alert("Balance khatam! Recharge karein."); }
    }

    function openPayment() { document.getElementById('payment-modal').style.display='block'; }
    function closePayment() { document.getElementById('payment-modal').style.display='none'; }

    function generateQR() {
        let amt = document.getElementById('recharge-amt').value;
        let upi = "7470807598-1@nyes"; // Aapka UPI ID
        if(amt >= 100) {
            let url = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=${upi}%26am=${amt}%26cu=INR%26pn=LGCLUB`;
            document.getElementById('qr-img').src = url;
            document.getElementById('qr-display').style.display = 'block';
        } else { alert("Minimum ₹100"); }
    }

    function showReg() { document.getElementById('auth-section').children[0].style.display='none'; document.getElementById('reg-form').style.display='block'; }
    function showLogin() { document.getElementById('reg-form').style.display='none'; document.getElementById('auth-section').children[0].style.display='block'; }
</script>
</body>
</html>
