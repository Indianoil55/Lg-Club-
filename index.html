<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG CLUB - REAL SERVER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .box { background: #1a1a1a; border: 1px solid #ff3333; border-radius: 15px; padding: 25px; margin: 50px auto; max-width: 320px; box-shadow: 0 0 10px #ff3333; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; }
        button { background: #ff3333; color: #fff; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        #dashboard { display: none; }
        .signal { font-size: 2.5em; color: #00ff7f; margin: 20px 0; font-weight: bold; }
        p { color: #888; cursor: pointer; font-size: 0.9em; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="auth-section">
        <div class="box" id="login-form">
            <h2 style="color: #ff3333;">LG CLUB LOGIN</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()">SIGN IN</button>
            <p onclick="showReg()">New User? Create Account</p>
        </div>
        <div class="box" id="reg-form" style="display: none;">
            <h2 style="color: #ff3333;">REGISTER USER</h2>
            <input type="text" id="reg-user" placeholder="Choose Username">
            <input type="password" id="reg-pass" placeholder="Create Password">
            <button onclick="register()">REGISTER</button>
            <p onclick="showLogin()">Back to Login</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="box">
            <h2 style="color: #00ff7f;">LIVE PREDICTOR</h2>
            <div class="signal" id="res">READY</div>
            <button onclick="getSignal()">GET SIGNAL</button>
            <p onclick="location.reload()" style="color:red">Logout</p>
        </div>
    </div>

<script>
    // Firebase Connection
    const firebaseConfig = { databaseURL: "https://lg-club-db-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function register() {
        let u = document.getElementById('reg-user').value;
        let p = document.getElementById('reg-pass').value;
        if(u && p) {
            db.ref('users/' + u).set({ password: p }).then(() => {
                alert("Account Created!"); showLogin();
            });
        }
    }

    function login() {
        let u = document.getElementById('user').value;
        let p = document.getElementById('pass').value;
        if(u === 'admin' && p === '1234') { openDash(); return; } // Default Admin
        db.ref('users/' + u).once('value').then((snap) => {
            if(snap.exists() && snap.val().password === p) { openDash(); }
            else { alert("Invalid User/Pass!"); }
        });
    }

    function getSignal() {
        document.getElementById('res').innerText = "SCANNING...";
        setTimeout(() => { 
            document.getElementById('res').innerText = Math.random() > 0.5 ? "BIG 🔴" : "SMALL 🟢"; 
        }, 1000);
    }

    function openDash() { document.getElementById('auth-section').style.display='none'; document.getElementById('dashboard').style.display='block'; }
    function showReg() { document.getElementById('login-form').style.display='none'; document.getElementById('reg-form').style.display='block'; }
    function showLogin() { document.getElementById('reg-form').style.display='none'; document.getElementById('login-form').style.display='block'; }
</script>
</body>
</html>
